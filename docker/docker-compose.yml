services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factory_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-factory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-factory}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-factory_pass}
    volumes:
      - minio_data:/data

  minio_init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-factory} ${MINIO_ROOT_PASSWORD:-factory_pass};
      mc mb --ignore-existing local/media;
      mc mb --ignore-existing local/videos;
      exit 0;
      "

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped

    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-factory}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-factory_secure_pass}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin123
      WEBHOOK_URL: http://localhost:5678/

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    environment:
      WHISPER__MODEL: Systran/faster-whisper-small

  tts_worker:
    build:
      context: ./workers/tts
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379

  render_worker:
    build:
      context: ./workers/render
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379

volumes:
  postgres_data:
  redis_data:
  minio_data:
